components:
  schemas:
    model.AuthResult:
      properties:
        created_at:
          form: created_at
          type: string
        email:
          form: email
          type: string
        id:
          form: id
          type: integer
        jwt:
          format: jwt
          type: string
        name:
          form: name
          type: string
        password:
          form: password
          type: string
        picture_url:
          form: picture_url
          type: string
        profile_updated_at:
          form: profile_updated_at
          type: string
        updated_at:
          form: updated_at
          type: string
      required:
        - email
        - name
        - password
      type: object
    model.Credentials:
      properties:
        email:
          form: email
          type: string
        password:
          form: password
          type: string
      required:
        - email
        - password
      type: object
    model.Problem:
      properties:
        detail:
          type: string
        status:
          type: integer
        title:
          type: string
      type: object
    model.User:
      properties:
        email:
          form: email
          type: string
        name:
          form: name
          type: string
        password:
          form: password
          type: string
        picture_url:
          form: picture_url
          type: string
      required:
        - email
        - name
        - password
      type: object
    model.UserIdentified:
      properties:
        created_at:
          form: created_at
          type: string
        email:
          form: email
          type: string
        id:
          form: id
          type: integer
        name:
          form: name
          type: string
        password:
          form: password
          type: string
        picture_url:
          form: picture_url
          type: string
        profile_updated_at:
          form: profile_updated_at
          type: string
        updated_at:
          form: updated_at
          type: string
      required:
        - email
        - name
        - password
      type: object
  securitySchemes:
    BearerAuth:
      scheme: bearer
      type: http
externalDocs:
  description: OpenAPI
  url: https://swagger.io/resources/open-api/
info:
  contact:
    email: suhartanto@kekkon.nexus
    name: Ryan Suhartanto
    url: https://github.com/ryansuhartanto/koda-b8-backend2
  description: Go exercise implementing a simple REST server.
  license:
    name: MIT
  title: GoREST
  version: "1.0"
openapi: 3.1.0
paths:
  /auth/login:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/model.Credentials"
              description: Credentials
              summary: body
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/model.Credentials"
              description: Credentials
              summary: formData
        description: Credentials | Credentials
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model.AuthResult"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model.Problem"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model.Problem"
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model.Problem"
          description: Internal Server Error
      summary: Log in
      tags:
        - auth
  /auth/register:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/model.User"
              description: New user
              summary: body
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/model.User"
              description: New user
              summary: formData
          multipart/form-data:
            schema:
              type: object
        description: New user | New user
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model.AuthResult"
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model.Problem"
          description: Bad Request
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model.Problem"
          description: Conflict
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model.Problem"
          description: Internal Server Error
      summary: Register a new user
      tags:
        - auth
  /users/:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/model.UserIdentified"
                type: array
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model.Problem"
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model.Problem"
          description: Internal Server Error
      security:
        - BearerAuth: []
      summary: List users
      tags:
        - users
  /users/{id}:
    delete:
      parameters:
        - description: User ID
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model.Problem"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model.Problem"
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model.Problem"
          description: Internal Server Error
      security:
        - BearerAuth: []
      summary: Delete a user
      tags:
        - users
    patch:
      parameters:
        - description: User ID
          in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/model.User"
              description: User fields
              summary: body
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/model.User"
              description: User fields
              summary: formData
        description: User fields | User fields
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model.UserIdentified"
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model.Problem"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model.Problem"
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model.Problem"
          description: Internal Server Error
      security:
        - BearerAuth: []
      summary: Update a user
      tags:
        - users
  /users/{id}/picture:
    put:
      parameters:
        - description: User ID
          in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              title: picture
              type: file
          multipart/form-data:
            schema:
              type: object
        description: Picture file (omit or send empty body to clear)
      responses:
        "200":
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model.Problem"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model.Problem"
          description: Unauthorized
        "413":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model.Problem"
          description: Request Entity Too Large
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model.Problem"
          description: Unprocessable Entity
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model.Problem"
          description: Internal Server Error
      security:
        - BearerAuth: []
      summary: Upload or clear a user's profile picture
      tags:
        - users
servers:
  - url: http://localhost:8080
